name: Deploy jvf_viewer to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            jvf_parser/package.json
            jvf_viewer/package.json

      - name: Install jvf_parser deps
        run: npm install
        working-directory: jvf_parser

      - name: Build jvf_parser
        run: npm run build
        working-directory: jvf_parser

      - name: Install jvf_viewer deps
        run: npm install
        working-directory: jvf_viewer

      - name: Build jvf_viewer
        run: npm run build
        working-directory: jvf_viewer

      - uses: actions/upload-pages-artifact@v3
        with:
          path: jvf_viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
