<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JVF DTM Prohlizec</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header id="app-header">
      <div class="header-left">
        <span class="app-logo">&#11041;</span>
        <h1>JVF DTM Prohlizec</h1>
      </div>
      <div class="header-right">
        <button id="btn-upload" class="btn btn-primary">
          <span class="btn-icon">&#8593;</span> Nahrat soubor
        </button>
        <input type="file" id="file-input" accept=".xml" style="display:none" />
        <button id="btn-zoom" class="btn btn-secondary" disabled title="Nejprve nahrajte JVF soubor">
          <span class="btn-icon">&#8982;</span> Zoom na data
        </button>
        <button id="btn-validate" class="btn btn-secondary" disabled title="Nejprve nahrajte JVF soubor">
          Zkontrolovat
        </button>
        <button id="btn-3d" class="btn btn-secondary">3D</button>
      </div>
    </header>
    <div id="app-body">
      <aside id="layer-panel">
        <div class="panel-header">Vrstvy</div>
        <div class="panel-section">
          <div class="panel-section-title">Podkladove mapy</div>
          <div id="base-layer-btns" class="base-layer-btns">
            <button class="base-btn active" data-layer="zm">Zakladni mapa</button>
            <button class="base-btn" data-layer="ortofoto">Ortofoto</button>
          </div>
        </div>
        <div class="panel-section">
          <div class="panel-section-title">JVF vrstvy</div>
          <div id="jvf-layers-list" class="jvf-layers-list">
            <div class="empty-hint">Nahrajte JVF soubor</div>
          </div>
        </div>
        <footer class="panel-footer">
          Made by Vojtech Dubrovsky for <span class="heart">&#10084;<span class="heart-tooltip">My wife</span></span>
          <span class="build-info" id="build-info"></span>
        </footer>
      </aside>
      <main id="map-area">
        <div id="map-container"></div>
        <canvas id="three-canvas" style="display:none"></canvas>
        <div id="z-exag-toolbar" style="display:none">
          <span class="z-exag-label">Výška:</span>
          <button class="btn btn-secondary btn-z-exag active" data-exag="1">1×</button>
          <button class="btn btn-secondary btn-z-exag" data-exag="2">2×</button>
          <button class="btn btn-secondary btn-z-exag" data-exag="5">5×</button>
          <button class="btn btn-secondary btn-z-exag" data-exag="10">10×</button>
        </div>
        <div id="loading-overlay" style="display:none">
          <div class="spinner"></div>
          <span>Nacitam...</span>
        </div>
      </main>
      <aside id="error-panel" style="display:none">
        <div class="panel-resize-handle" id="error-panel-resize"></div>
        <div class="panel-header error-panel-header">
          <span>Topologická validace</span>
          <button id="error-panel-close" class="panel-close-btn" aria-label="Zavrit">&times;</button>
        </div>
        <div class="error-panel-toolbar">
          <div id="error-summary" class="error-summary"></div>
          <div class="error-filters">
            <button class="filter-btn active" data-filter="all">Vše</button>
            <button class="filter-btn" data-filter="error">Chyby</button>
            <button class="filter-btn" data-filter="warning">Varování</button>
          </div>
        </div>
        <div id="error-list" class="error-list"></div>
      </aside>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
